<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="dynamic-island-wrapper">
    <div class="ambient-glow" id="ambient-glow"></div>
    <div class="dynamic-island">

      <div class="compact-view">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTJUkqkUuLBuqBtKfsUwrdPKe3SW-5Worv4h1lF4cUa_g&s=10" class="album-art compact-art" />
        <div class="equalizer compact-equalizer">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </div>
      </div>

      <div class="expanded-view">
        <img
          src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTJUkqkUuLBuqBtKfsUwrdPKe3SW-5Worv4h1lF4cUa_g&s=10"
          class="album-art" />

        <div class="track-info">
          <div class="title" id="track-title">Starboy</div>
          <div class="artist" id="track-artist">The Weeknd</div>

          <div class="progress-bar-container" id="progress-container">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
        </div>

        <div class="media-controls">
          <button class="control-btn" id="like-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
          </button>
          <button class="control-btn" id="prev-btn">⏮</button>
          <button class="control-btn play-btn" id="play-pause-btn">⏸</button>
          <button class="control-btn" id="next-btn">⏭</button>
          <button class="control-btn" id="loop-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
          </button>
        </div>
        
        <div class="lyrics-ticker" id="lyrics-ticker"></div>
      </div>
    </div>

  </div>


  <script type="module" src="./main.js"></script>

</body>

</html>

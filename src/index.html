<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="dynamic-island">
    
    <!-- Compact State (Just the music icon) -->
    <div class="compact-view">
      🎵
    </div>

    <!-- Expanded State (Album art and hardcoded text) -->
    <div class="expanded-view">
      <!-- A hardcoded Spotify album image -->
      <img src="https://i.scdn.co/image/ab67616d000048511e996f136113b2c28659556a" class="album-art" />
      
      <div class="track-info">
        <!-- Hardcoded text -->
        <div class="title">Starboy</div>
        <div class="artist">The Weeknd</div>
      </div>
    </div>

  </div>
</body>
</html>
